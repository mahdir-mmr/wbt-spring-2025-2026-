<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Contact</title>
</head>

<body>
    <form method="">
        <fieldset>
            <legend>Contact me</legend>
            <table>
                <tr>
                    <td><label for="First name">FIRST NAME:</label></td>
                    <td>
                        <input type="text" name="" id="">
                    </td>
                </tr>
                <tr>
                    <td><label for="Last name">Last name:</label></td>
                    <td><input type="text" name="" id=""></td>
                </tr>
                <tr>
                    <td><label for="Gender">Gender:</label></td>
                    <td><input type="radio" name="male" id="" required>Male
                        <input type="radio" name="" id="" required>Female
                    </td>
                </tr>
                <tr>
                    <td>Email:</td>
                    <td><input type="text" name="" id="" placeholder="Email" required></td>
                </tr>
                <tr>
                    <td>Company Name:</td>
                    <td><input type="text" name="" id=""></td>
                </tr>
                <tr>
                    <td>
                        Reason of contact:
                    </td>
                    <td>
                        <input type="radio" name="Reason" id="" required>Project
                        <input type="radio" name="Reason" id="" required>Thesis
                        <input type="radio" name="Reason" id="Reason" required>Job
                    </td>
                </tr>
                <tr>
                    <td>
                        Topic:
                    </td>
                    <td>
                        <input type="checkbox" name="Reason" id="" required>Web Development
                        <input type="checkbox" name="Reason" id="">Mobile Development
                        <input type="checkbox" name="Reason" id="Reason">AI/ML Development
                    </td>
                </tr>
                <tr>
                    <td>Consultation Date:</td>
                    <td><input type="date" name="" id="" required></td>
                </tr>


            </table>

        </fieldset>
        <br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>


    </form>
    <br>

    <a href="../index.html">Back to Home</a>
</body>

</html>
